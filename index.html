<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>washclof — web tools for the games I keep coming back to</title>
<meta name="description" content="I make free, no-account web tools for the games I keep coming back to. They just run in the browser.">
<link rel="canonical" href="https://washclof.com/">
<meta name="theme-color" content="#0e100e">
<meta property="og:type" content="website">
<meta property="og:url" content="https://washclof.com/">
<meta property="og:title" content="washclof — web tools for the games I keep coming back to">
<meta property="og:description" content="Free, no-account web tools for the games I keep coming back to. They just run in the browser.">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230e100e'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='22' font-weight='700' fill='%2386c99a' text-anchor='middle'%3E%3E%3C/text%3E%3C/svg%3E">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: #0e100e; font-family: 'JetBrains Mono', monospace; -webkit-font-smoothing: antialiased; }
  @keyframes wc-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  a { -webkit-tap-highlight-color: transparent; }
</style>
</helmet>

<div data-screen-label="Washclof — home (terminal)" style="min-height: 100vh; background: #0e100e; color: #cdd8cf; display: flex; flex-direction: column;">

  <!-- window bar -->
  <div style="height: 42px; flex: none; background: #141813; border-bottom: 1px solid #1e271f; display: flex; align-items: center; gap: 8px; padding: 0 clamp(16px, 4vw, 26px);">
    <span style="width: 11px; height: 11px; border-radius: 50%; background: #2b352b;"></span>
    <span style="width: 11px; height: 11px; border-radius: 50%; background: #2b352b;"></span>
    <span style="width: 11px; height: 11px; border-radius: 50%; background: #2b352b;"></span>
    <span style="margin-left: 12px; font-size: 12px; color: #5f6b60;">— washclof — zsh — 80×24</span>
  </div>

  <!-- content -->
  <main style="flex: 1; width: 100%; max-width: 760px; margin: 0 auto; padding: clamp(34px, 7vw, 76px) clamp(22px, 6vw, 60px) clamp(28px, 5vw, 52px);">

    <p style="font-size: 13px; color: #6f8577; margin: 0 0 clamp(22px, 4vw, 32px); letter-spacing: .04em;"><span style="color: #86c99a;">washclof</span><span style="color: #4f5f52;">@web</span> ~ %<span style="color: #cdd8cf;"> whoami</span></p>

    <h1 style="font-size: clamp(40px, 10vw, 58px); font-weight: 700; margin: 0 0 20px; letter-spacing: -.02em; color: #eef3ee; display: flex; align-items: center; gap: 4px; line-height: 1;">washclof</h1>
    <p style="font-size: clamp(15px, 3.4vw, 17px); color: #9fb0a3; margin: 0; max-width: 560px; line-height: 1.6;">I make web tools for the games I keep coming back to. All free, no accounts, they just run in the browser.</p>

    <p style="font-size: 13px; color: #6f8577; margin: clamp(38px, 6vw, 50px) 0 6px; letter-spacing: .04em;"><span style="color: #86c99a;">washclof</span><span style="color: #4f5f52;">@web</span> ~ % <span style="color: #cdd8cf;">ls projects/</span></p>

    <sc-for list="{{ projects }}" as="p" hint-placeholder-count="3">
      <a href="{{ p.url }}" style="display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: center; text-decoration: none; color: inherit; padding: 18px 16px; border-radius: 6px; border: 1px solid #1c261d; margin-top: 10px; transition: background .12s, border-color .12s;" style-hover="background: #141a14; border-color: #2e4a35;">
        <span>
          <span style="display: flex; align-items: baseline; gap: 10px 12px; flex-wrap: wrap;">
            <span style="font-size: clamp(17px, 4vw, 20px); font-weight: 600; color: #eef3ee;">{{ p.domain }}</span>
            <span style="font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: {{ p.tagColor }}; border: 1px solid {{ p.tagBorder }}; border-radius: 4px; padding: 2px 7px;">{{ p.game }}</span>
            <span style="font-size: 12px; color: #5f6b60; letter-spacing: .06em;">est. {{ p.year }}</span>
          </span>
          <span style="display: block; font-size: 14px; color: #7f9083; margin-top: 8px; line-height: 1.5;">{{ p.desc }}</span>
        </span>
        <span style="color: #86c99a; font-size: 20px;">→</span>
      </a>
    </sc-for>

    <p style="font-size: 13px; color: #6f8577; margin: clamp(30px, 5vw, 38px) 0 0; letter-spacing: .04em;"><span style="color: #86c99a;">washclof</span><span style="color: #4f5f52;">@web</span> ~ % <span style="color: #cdd8cf;">_</span><span style="display: inline-block; width: 9px; height: 15px; background: #cdd8cf; margin-left: 2px; vertical-align: -2px; animation: wc-blink 1.15s steps(1) infinite;"></span></p>
  </main>

  <!-- footer -->
  <footer style="flex: none; border-top: 1px solid #1a221b; padding: 20px clamp(22px, 6vw, 60px); max-width: 760px; width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;">
    <span style="font-size: 12px; color: #4f5f52; letter-spacing: .04em;">© 2026 washclof</span>
    <button type="button" onClick="{{ copyDiscord }}" title="Click to copy my Discord handle" style="appearance: none; background: none; border: none; padding: 0; font-family: inherit; font-size: 12px; letter-spacing: .04em; color: #6f8577; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: color .12s;" style-hover="color: #86c99a;">
      <span>discord <span style="color: #86c99a;">washclof</span></span>
      <span style="color: #5f6b60;">{{ copiedLabel }}</span>
    </button>
  </footer>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { projects: null, copied: false };

  copyDiscord = () => {
    const done = () => {
      this.setState({ copied: true });
      clearTimeout(this._t);
      this._t = setTimeout(() => this.setState({ copied: false }), 1600);
    };
    try { navigator.clipboard.writeText('washclof').then(done, done); }
    catch (e) { done(); }
  };

  componentDidMount() {
    fetch('./projects.json')
      .then(function (r) { return r.json(); })
      .then((projects) => this.setState({ projects }))
      .catch(function () { /* falls back to DEFAULTS */ });
  }

  renderVals() {
    const DEFAULTS = [
      { name: 'Modpack Index', url: 'https://modpackindex.com', domain: 'modpackindex.com', game: 'Minecraft', year: '2015', color: '#3f7d4e', desc: 'Search & filter 143,000+ modpacks by mod, version, loader & category.' },
      { name: 'Norrath Transit Authority', url: 'https://eqnta.com', domain: 'eqnta.com', game: 'EverQuest', year: '2026', color: '#2f6d8f', desc: 'Plan the fastest route between any two EverQuest zones: boats, PoK books, spires, class ports.' },
      { name: 'EQLFilter', url: 'https://eqlfilter.com', domain: 'eqlfilter.com', game: 'EverQuest', year: '2026', color: '#b5622f', desc: 'Build, save & share EverQuest Legends loot filters. No account, runs in your browser.' }
    ];
    const GAMES = {
      Minecraft: { tag: '#86c99a', border: '#2e4a35' },
      EverQuest: { tag: '#e8b76b', border: '#4d3f22' }
    };
    const source = this.state.projects || DEFAULTS;
    const projects = source.map(function (p) {
      const g = GAMES[p.game] || GAMES.EverQuest;
      return Object.assign({}, p, { tagColor: g.tag, tagBorder: g.border });
    });
    return { projects: projects, copyDiscord: this.copyDiscord, copiedLabel: this.state.copied ? 'copied ✓' : '' };
  }
}
</script>

<!-- Easter eggs: the blinking prompt is real. Type a command, hit Enter. All undone by refresh. -->
<style>
  @keyframes wc-fall { to { transform: translateY(120vh) rotate(var(--r, 25deg)); opacity: 0; } }
  #wc-panic { position: fixed; inset: 0; background: #0e100e; color: #86c99a; font: 14px/1.6 'JetBrains Mono', monospace; padding: clamp(20px,6vw,60px); z-index: 9999; white-space: pre-wrap; overflow: auto; cursor: pointer; animation: wc-blink-in .25s ease-out; }
  @keyframes wc-blink-in { from { opacity: 0; } }
</style>
<script>
(function () {
  // ponytail: vanilla, owns its own DOM, self-heals on the reconciler's rare re-render.
  var buf = '', hist = [], dead = false;

  function esc(s){ return String(s).replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
  function echo(html){ hist.push('<span style="color:#7f9083">' + html + '</span>'); }
  function promptHTML(cmd){
    return '<span style="color:#86c99a">washclof</span><span style="color:#4f5f52">@web</span> ~ % <span style="color:#cdd8cf">' + esc(cmd) + '</span>';
  }

  function ensureTerm(){
    var main = document.querySelector('main');
    if (!main) return null;
    var deco = [].slice.call(main.querySelectorAll(':scope > p')).pop();  // decorative prompt
    if (deco && deco.querySelector('[style*="wc-blink"]')) deco.style.display = 'none';
    var term = document.getElementById('wc-term');
    if (!term) {
      term = document.createElement('div');
      term.id = 'wc-term';
      term.style.cssText = 'font-size:13px;letter-spacing:.04em;margin-top:6px;';
      main.appendChild(term);
    }
    return term;
  }

  function render(){
    if (dead) return;
    var term = ensureTerm();
    if (!term) return;
    var out = hist.map(function(l){ return '<p style="margin:2px 0;line-height:1.5;white-space:pre-wrap">' + l + '</p>'; }).join('');
    term.innerHTML = out +
      '<p style="margin:6px 0 0;color:#6f8577">' + promptHTML(buf) +
      '<span style="display:inline-block;width:9px;height:15px;background:#cdd8cf;margin-left:2px;vertical-align:-2px;animation:wc-blink 1.15s steps(1) infinite"></span></p>';
  }

  function lsOut(){
    var out = [].slice.call(document.querySelectorAll('main a[href^="http"]')).map(function(a){
      var d = a.querySelector('span span span');
      return ((d ? d.textContent : a.getAttribute('href')) || '').trim() + '/';
    });
    return out.length ? out.join('   ') : 'modpackindex.com/   eqnta.com/   eqlfilter.com/';
  }

  var HELP = [
    'commands:',
    '  help  whoami  ls  pwd  date  echo  clear',
    '  coffee  sudo  matrix  exit',
    '  rm -rf /   — don\'t.'
  ].join('\n');

  function run(raw){
    var cmd = (raw || '').trim();
    buf = '';
    hist.push(promptHTML(cmd));
    render();
    if (!cmd) return;
    var lc = cmd.toLowerCase();

    if (/^(sudo\s+)?rm\s+-\S*[rf]/.test(lc)) return destroy();
    if (lc === 'matrix') { matrix(); return render(); }
    if (lc === 'exit' || lc === 'logout' || lc === 'quit') return logout();

    if (lc === 'help' || lc === '?' || lc === 'man') echo(HELP);
    else if (lc === 'whoami') echo('a person who still logs in. respect.');
    else if (/^ls\b/.test(lc)) echo(lsOut());
    else if (lc === 'clear' || lc === 'cls') hist = [];
    else if (lc === 'date') echo(esc(new Date().toString()));
    else if (lc === 'pwd') echo('/home/washclof');
    else if (/^echo\s/i.test(cmd)) echo(esc(cmd.replace(/^echo\s+/i, '')));
    else if (/^sudo\s/i.test(cmd)) echo('we trust you have received the usual lecture from the local System Administrator.\n\n' + esc(cmd.replace(/^sudo\s+/i, '')) + ': permission denied. nice try.');
    else if (lc === 'coffee' || lc === 'brew' || lc === 'make coffee') echo("HTTP 418 — I'm a teapot. ☕");
    else echo('zsh: command not found: ' + esc(cmd.split(/\s+/)[0]));
    render();
  }

  function destroy(){
    dead = true;
    render();
    dead = false; // let the last line paint, then re-lock below
    var screen = document.querySelector('[data-screen-label]') || document.body;
    var parts = [];
    [].forEach.call(screen.children, function(c){
      if (c.tagName === 'MAIN') [].forEach.call(c.children, function(k){ parts.push(k); });
      else parts.push(c);
    });
    parts.forEach(function(el, i){
      el.style.setProperty('--r', (Math.random() * 80 - 40).toFixed(1) + 'deg');
      el.style.animation = 'wc-fall .9s cubic-bezier(.6,.05,.9,.3) forwards';
      el.style.animationDelay = (i * 70) + 'ms';
      el.style.pointerEvents = 'none';
    });
    dead = true;
    setTimeout(panic, 700 + parts.length * 70);
  }

  function panic(){
    var o = document.createElement('div');
    o.id = 'wc-panic';
    o.textContent = [
      '',
      '[    0.000000] Kernel panic - not syncing: washclof filesystem obliterated',
      '[    0.000001] rm: cannot undo -rf. it never could.',
      '',
      '        _______',
      '       / gone. \\    every project. every zone. every modpack.',
      '       \\_______/    all of it. poof.',
      '',
      'Segmentation fault (core dumped)',
      '',
      '>>> refresh the page to reboot the machine <<<'
    ].join('\n');
    o.onclick = function(){ location.reload(); };
    document.body.appendChild(o);
  }

  function logout(){
    dead = true;
    var o = document.createElement('div');
    o.style.cssText = 'position:fixed;inset:0;background:#0e100e;color:#6f8577;font:14px "JetBrains Mono",monospace;display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;transition:opacity .5s;cursor:pointer';
    o.textContent = '[ connection to washclof closed. refresh to reconnect. ]';
    o.onclick = function(){ location.reload(); };
    document.body.appendChild(o);
    requestAnimationFrame(function(){ o.style.opacity = '1'; });
  }

  function matrix(){
    var c = document.createElement('canvas');
    c.style.cssText = 'position:fixed;inset:0;z-index:9998;background:#0e100e;cursor:pointer';
    document.body.appendChild(c);
    var ctx = c.getContext('2d'), W, H, cols, ys;
    function size(){ W = c.width = innerWidth; H = c.height = innerHeight; cols = Math.floor(W / 14); ys = []; for (var i = 0; i < cols; i++) ys[i] = Math.random() * H; }
    size(); addEventListener('resize', size);
    var chars = 'アイウｦﾝ0123456789<>=%$#*+-'.split(''), raf;
    function draw(){
      ctx.fillStyle = 'rgba(14,16,14,.08)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#86c99a'; ctx.font = '13px monospace';
      for (var i = 0; i < cols; i++){
        ctx.fillText(chars[(Math.random() * chars.length) | 0], i * 14, ys[i]);
        ys[i] = ys[i] > H + Math.random() * 400 ? 0 : ys[i] + 14;
      }
      raf = requestAnimationFrame(draw);
    }
    draw();
    function stop(){ cancelAnimationFrame(raf); removeEventListener('resize', size); c.style.transition = 'opacity .6s'; c.style.opacity = '0'; setTimeout(function(){ c.remove(); }, 600); }
    c.onclick = stop; setTimeout(stop, 7000);
    echo('entering the matrix... (click to exit)');
  }

  document.addEventListener('keydown', function(e){
    if (dead) return;
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'BUTTON' || t.isContentEditable)) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === 'Enter') { e.preventDefault(); run(buf); }
    else if (e.key === 'Backspace') { e.preventDefault(); buf = buf.slice(0, -1); render(); }
    else if (e.key.length === 1) { e.preventDefault(); buf += e.key; render(); }
  });

  (function init(){
    var main = document.querySelector('main');
    var deco = main && [].slice.call(main.querySelectorAll(':scope > p')).pop();
    if (!deco || !deco.querySelector('[style*="wc-blink"]')) return setTimeout(init, 120);
    render();
  })();
})();
</script>
</body>
</html>
